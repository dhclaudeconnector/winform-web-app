services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: winform-backend
    env_file:
      - .env
    ports:
      - "${PORT:-3001}:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - winform-network
    restart: unless-stopped
    volumes:
      # Mount source code để hot reload
      - ./backend/src:/app/src
      # Update system volumes
      - ./backups:/app/backups
      - ./update-temp:/app/update-temp
      - ./version.json:/app/version.json
      # Exclude node_modules để tránh conflict
      - /app/node_modules
    environment:
      - UPDATE_CHECK_ENABLED=${UPDATE_CHECK_ENABLED:-false}
      - UPDATE_CHECK_INTERVAL=${UPDATE_CHECK_INTERVAL:-21600000}
      - GIT_RELEASE_URL=${GIT_RELEASE_URL:-}
      - GIT_ACCESS_TOKEN=${GIT_ACCESS_TOKEN:-}
      - DEPLOYMENT_TYPE=docker

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: winform-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - winform-network
    restart: unless-stopped
    volumes:
      # Mount source code để hot reload
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      # Exclude các thư mục build
      - /app/node_modules
      - /app/.next

networks:
  winform-network:
    driver: bridge
